<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Magic</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-image: url('https://img.freepik.com/free-photo/movie-background-collage_23-2149876028.jpg');
      background-size: cover;
      background-position: center;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      text-align: center;
      padding: 2em;
      border-radius: 10px;
      background-color: rgba(0, 0, 0, 0.5);
      max-width: 90%;
    }

    a {
      display: inline-block;
      margin-top: 1em;
      padding: 0.75em 1.5em;
      background-color: #00ffff;
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    a:hover {
      background-color: #00cccc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to Movie Magic</h1>
    <p>Explore the magic of movies in your city!</p>
    <a href="http://127.0.0.1:5000//signup">Get Started</a>
  </div>
</body>
</html>
