<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Ticket</title>
    <style>
        body {
            background: #121212;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }

        h2 {
            text-align: center;
            color: #00e676;
            margin-bottom: 30px;
        }

        .ticket-detail {
            font-size: 16px;
            line-height: 1.7;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .ticket-detail strong {
            color: #00bcd4;
        }

        .actions {
            text-align: center;
            margin-top: 20px;
        }

        a, button {
            display: inline-block;
            margin: 10px 10px;
            padding: 10px 20px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        a {
            background-color: #444;
            color: #fff;
        }

        a:hover {
            background-color: #666;
        }

        button {
            background-color: #00bcd4;
            color: #fff;
        }

        button:hover {
            background-color: #0097a7;
        }

        @media print {
            body {
                background: #fff;
                color: #000;
            }
            .container {
                box-shadow: none;
                background: #fff;
                border: 1px solid #ccc;
            }
            a, button {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Your Ticket for {{ movie }}</h2>
        <div class="ticket-detail">
            <p><strong>Name:</strong> {{ details.name }}</p>
            <p><strong>Seats:</strong> {{ details.seats }}</p>
            <p><strong>Date:</strong> {{ details.date }}</p>
            <p><strong>Time:</strong> {{ details.time }}</p>
            <p><strong>Total Bill:</strong> ₹{{ details.amount }}</p>
        </div>

        <div class="actions">
            <a href="/">← Back to Home</a>
            <button onclick="window.print()">🖨️ Print Ticket</button>
        </div>
    </div>
</body>
</html>
