<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Movie</title>
    <style>
        body {
            background: #121212;
            color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 50px 20px;
            margin: 0;
        }

        .form-container {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.07);
        }

        h2 {
            text-align: center;
            color: #00e676;
            margin-bottom: 30px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00e676;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00c853, #00e5ff);
            border: none;
            border-radius: 8px;
            font-size: 17px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #00bfa5, #1de9b6);
        }

        @media (max-width: 600px) {
            .form-container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Book: {{ movie }}</h2>
        <form method="POST" action="{{ url_for('book', movie=movie) }}">
            <input type="hidden" name="movie" value="{{ movie }}">
            <input name="name" placeholder="Full Name" required>
            <input name="email" placeholder="Email Address" required>
            <input name="phone" placeholder="Phone Number" required>
            <input name="date" type="date" required>
            <select name="time" required>
                <option value="">Select Show Time</option>
                <option>10:00 AM</option>
                <option>1:00 PM</option>
                <option>6:00 PM</option>
            </select>
            <button type="submit">🎟 Continue to Seat Selection</button>
        </form>
    </div>
</body>
</html>
